name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        id: release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

          if ! grep -q "^## ${VERSION}\( \|$\)" CHANGELOG.md; then
            echo "No CHANGELOG.md entry found for version $VERSION."
            exit 1
          fi

          awk -v version="$VERSION" '
            $0 ~ "^## " version "( |$)" { found=1; print; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package
        run: npm run pack:check

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --title "@rakelabs/disputes-sdk v${{ steps.release.outputs.version }}" --notes-file release-notes.md

      - name: Publish to npm
        run: npm publish --provenance --access public
